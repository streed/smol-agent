name: Model Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test ${{ matrix.model }}
    runs-on: ubuntu-latest
    environment: Model Test
    strategy:
      fail-fast: false
      matrix:
        # Ollama cloud models - fast, reliable, optimized for coding
        # https://ollama.com/search?c=cloud
        model:
          - qwen3-coder-next:cloud    # Optimized for agentic coding workflows
          - devstral-small-2:cloud    # 24B, excels at tools & multi-file edits
          - rnj-1:cloud               # 8B, optimized for code and STEM
          - ministral-3:cloud         # 3-14B, edge deployment with tool support

    steps:
      - name: Sanitize model name for artifacts
        id: sanitize
        run: |
          # Replace colons with hyphens for artifact names
          SANITIZED=$(echo "${{ matrix.model }}" | sed 's/:/-/g')
          echo "model_name=$SANITIZED" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate API Key
        run: |
          if [ -z "${{ secrets.OLLAMA_API_KEY }}" ]; then
            echo "❌ Error: OLLAMA_API_KEY not found in 'Model Test' environment"
            echo "Please add OLLAMA_API_KEY to Settings → Environments → Model Test → Secrets"
            exit 1
          fi
          echo "✅ OLLAMA_API_KEY is configured"

      - name: Setup Ollama Cloud
        run: |
          # Install Ollama client
          curl -fsSL https://ollama.com/install.sh | sh

          # Configure for cloud usage (uses OLLAMA_API_KEY from environment secrets)
          echo "Using Ollama cloud models - no local pull needed"
          echo "Model: ${{ matrix.model }}"
          echo "Host: https://ollama.com"

        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

      - name: Run E2E tests
        id: test
        continue-on-error: true
        env:
          # Model configuration
          SMOL_TEST_MODEL: ${{ matrix.model }}

          # Ollama cloud API (from 'Model Test' environment secrets)
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_HOST: https://ollama.com

          # Test parameters
          SMOL_TEST_RETRIES: 1
          SMOL_TEST_MAX_ITER: 20
          SMOL_TEST_CTX: 32768

          # Cloud models are much faster - reasonable timeouts
          SMOL_TEST_TIMEOUT_SIMPLE: 180000    # 3 minutes
          SMOL_TEST_TIMEOUT_MEDIUM: 300000    # 5 minutes
          SMOL_TEST_TIMEOUT_COMPLEX: 420000   # 7 minutes
        run: |
          echo "=========================================="
          echo "Testing model: ${{ matrix.model }}"
          echo "=========================================="
          echo ""

          # Run tests normally, showing output like local
          node test/e2e/runner.js | tee test-output.log

          # Capture exit code
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          echo ""
          echo "Exit code: $TEST_EXIT_CODE"
          exit $TEST_EXIT_CODE

      - name: Upload test output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-output-${{ steps.sanitize.outputs.model_name }}
          path: test-output.log
          retention-days: 30

  aggregate:
    name: Aggregate Results
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Sanitize run ID for artifacts
        id: sanitize
        run: |
          # Use short SHA for artifact name
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Generate summary
        run: |
          echo "# 🎯 Model Benchmark Results" > summary.md
          echo "" >> summary.md
          echo "Tests completed for all models. Check individual test outputs for details." >> summary.md
          echo "" >> summary.md

          # List all test outputs
          for dir in results/test-output-*; do
            if [ -f "$dir/test-output.log" ]; then
              model=$(basename "$dir" | sed 's/test-output-//')
              echo "## Model: $model" >> summary.md
              echo "" >> summary.md
              echo '```' >> summary.md
              tail -50 "$dir/test-output.log" >> summary.md
              echo '```' >> summary.md
              echo "" >> summary.md
            fi
          done

          cat summary.md

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-summary-${{ steps.sanitize.outputs.short_sha }}
          path: summary.md

      - name: Post summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('summary.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
