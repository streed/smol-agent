name: Model Benchmark

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test ${{ matrix.model }}
    runs-on: ubuntu-latest
    environment: Model Test
    strategy:
      fail-fast: false
      matrix:
        # Ollama cloud models - accessed via https://ollama.com API
        # Full list: curl https://ollama.com/api/tags
        model:
          - qwen3-coder-next # ~80B, optimized for agentic coding workflows
          - devstral-small-2:24b # 24B, excels at tools & multi-file edits
          - rnj-1:8b # 8B, optimized for code and STEM
          - ministral-3:3b # 3B, cloud-optimized with tool support
          - glm-5 # ~744B, strong reasoning & agentic model

    steps:
      - name: Sanitize model name for artifacts
        id: sanitize
        run: |
          # Replace colons with hyphens for artifact names
          SANITIZED=$(echo "${{ matrix.model }}" | sed 's/:/-/g')
          echo "model_name=$SANITIZED" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++

      - name: Install dependencies
        run: npm ci

      - name: Validate API Key
        run: |
          if [ -z "${{ secrets.OLLAMA_API_KEY }}" ]; then
            echo "❌ Error: OLLAMA_API_KEY not found in 'Model Test' environment"
            echo "Please add OLLAMA_API_KEY to Settings → Environments → Model Test → Secrets"
            exit 1
          fi
          echo "✅ OLLAMA_API_KEY is configured"

      - name: Setup Ollama Cloud
        run: |
          # Install Ollama client
          curl -fsSL https://ollama.com/install.sh | sh

          # Configure for cloud usage (uses OLLAMA_API_KEY from environment secrets)
          echo "Using Ollama cloud models - no local pull needed"
          echo "Model: ${{ matrix.model }}"
          echo "Host: https://ollama.com"

        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

      - name: Run E2E tests
        id: test
        continue-on-error: true
        env:
          # Model configuration
          SMOL_TEST_MODEL: ${{ matrix.model }}

          # Ollama cloud API (from 'Model Test' environment secrets)
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_HOST: https://ollama.com

          # Test parameters
          SMOL_TEST_RETRIES: 1
          SMOL_TEST_MAX_ITER: 20
          SMOL_TEST_CTX: 32768

          # Cloud models are much faster - reasonable timeouts
          SMOL_TEST_TIMEOUT_SIMPLE: 180000 # 3 minutes
          SMOL_TEST_TIMEOUT_MEDIUM: 300000 # 5 minutes
          SMOL_TEST_TIMEOUT_COMPLEX: 420000 # 7 minutes
        run: |
          echo "=========================================="
          echo "Testing model: ${{ matrix.model }}"
          echo "=========================================="
          echo ""

          # Run tests with JSON output, capture both human-readable and JSON
          node test/e2e/runner.js --json > test-results.json 2> test-output.log

          # Capture exit code
          TEST_EXIT_CODE=$?
          echo ""
          echo "Exit code: $TEST_EXIT_CODE"

          # Also display the human-readable output
          cat test-output.log

          exit $TEST_EXIT_CODE

      - name: Upload test output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-output-${{ steps.sanitize.outputs.model_name }}
          path: |
            test-output.log
            test-results.json
          retention-days: 30

  aggregate:
    name: Aggregate Results
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Sanitize run ID for artifacts
        id: sanitize
        run: |
          # Use short SHA for artifact name
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Collect benchmark results into JSON
        id: collect
        run: |
          MODELS_JSON='[]'
          OVERALL="success"

          for dir in results/test-output-*; do
            model=$(basename "$dir" | sed 's/test-output-//')

            if [ ! -f "$dir/test-results.json" ] || ! jq empty "$dir/test-results.json" 2>/dev/null; then
              MODELS_JSON=$(echo "$MODELS_JSON" | jq \
                --arg name "$model" \
                '. += [{"name": $name, "status": "error", "passed": 0, "total": 0, "score": 0}]')
              OVERALL="failure"
              continue
            fi

            total=$(jq -r '.aggregate.total' "$dir/test-results.json")
            passed=$(jq -r '.aggregate.passed' "$dir/test-results.json")
            score=$(jq -r '.aggregate.normalized' "$dir/test-results.json")

            if [ -z "$total" ] || [ "$total" = "null" ]; then
              MODELS_JSON=$(echo "$MODELS_JSON" | jq \
                --arg name "$model" \
                '. += [{"name": $name, "status": "error", "passed": 0, "total": 0, "score": 0}]')
              OVERALL="failure"
              continue
            fi

            if [ "$passed" = "$total" ]; then
              status="pass"
            else
              status="fail"
              OVERALL="failure"
            fi

            MODELS_JSON=$(echo "$MODELS_JSON" | jq \
              --arg name "$model" \
              --arg status "$status" \
              --argjson passed "$passed" \
              --argjson total "$total" \
              --argjson score "$score" \
              '. += [{"name": $name, "status": $status, "passed": $passed, "total": $total, "score": $score}]')
          done

          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          jq -n \
            --argjson runNumber ${{ github.run_number }} \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg sha "$SHORT_SHA" \
            --arg conclusion "$OVERALL" \
            --argjson models "$MODELS_JSON" \
            '{runNumber: $runNumber, date: $date, sha: $sha, conclusion: $conclusion, models: $models}' \
            > benchmark-data.json

          echo "Collected benchmark data:"
          cat benchmark-data.json

      - name: Setup Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

      - name: Generate AI summary with glm-5
        id: ai_summary
        continue-on-error: true
        run: |
          # Validate API key is present
          if [ -z "$OLLAMA_API_KEY" ]; then
            echo "Warning: OLLAMA_API_KEY is not set, skipping AI summary"
            exit 0
          fi

          DATA=$(cat benchmark-data.json)

          # Build the request payload safely using jq to avoid injection
          REQUEST_PAYLOAD=$(jq -n \
            --arg model "glm-5" \
            --arg content "You are a helpful assistant analyzing LLM model benchmark results for smol-agent, a coding agent. Based on the following JSON benchmark results, write a concise 2-3 sentence analysis identifying which models performed well, which struggled, and any notable patterns. Results: $DATA" \
            '{model: $model, messages: [{role: "user", content: $content}], stream: false}')

          HTTP_STATUS=$(curl -s -o /tmp/ollama-response.json -w "%{http_code}" \
            --max-time 60 \
            -X POST https://ollama.com/api/chat \
            -H "Authorization: Bearer $OLLAMA_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$REQUEST_PAYLOAD")

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Warning: Ollama API returned HTTP $HTTP_STATUS, skipping AI summary"
            exit 0
          fi

          SUMMARY=$(jq -r '.message.content // empty' /tmp/ollama-response.json)

          if [ -z "$SUMMARY" ]; then
            echo "Warning: Could not extract summary from glm-5 response"
            exit 0
          fi

          echo "AI Summary: $SUMMARY"

          # Inject summary into benchmark-data.json
          jq --arg summary "$SUMMARY" '. + {summary: $summary}' benchmark-data.json > benchmark-data-final.json
          mv benchmark-data-final.json benchmark-data.json
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

      - name: Generate benchmark SVG image
        run: node scripts/generate-benchmark-image.js --input benchmark-data.json

      - name: Commit and push benchmark image
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/benchmark-results.svg
          if git diff --staged --quiet; then
            echo "No changes to benchmark image, skipping commit"
          else
            git commit -m "chore: update benchmark results image [skip ci]"
            git push || { echo "::warning::Failed to push benchmark image update"; exit 0; }
            echo "✓ Benchmark image committed and pushed"
          fi

      - name: Generate summary
        run: |
          # Parse all JSON results and create summary
          echo "# 🎯 Model Benchmark Results" > summary.md
          echo "" >> summary.md

          # Track overall pass/fail
          PASS_COUNT=0
          FAIL_COUNT=0
          ERROR_COUNT=0
          FAILED_MODELS=""
          ERROR_MODELS=""

          # Process each model's results
          for dir in results/test-output-*; do
            model=$(basename "$dir" | sed 's/test-output-//')

            # Check if JSON exists and is valid
            if [ ! -f "$dir/test-results.json" ]; then
              status="⚠️ ERROR"
              ERROR_COUNT=$((ERROR_COUNT + 1))
              ERROR_MODELS="$ERROR_MODELS $model (no results)"
              echo "**$model**: $status (no test-results.json found)" >> summary.md
              continue
            fi

            # Validate JSON
            if ! jq empty "$dir/test-results.json" 2>/dev/null; then
              status="⚠️ ERROR"
              ERROR_COUNT=$((ERROR_COUNT + 1))
              ERROR_MODELS="$ERROR_MODELS $model (invalid JSON)"
              echo "**$model**: $status (invalid JSON output)" >> summary.md
              continue
            fi

            # Extract aggregate info from JSON
            total=$(jq -r '.aggregate.total' "$dir/test-results.json")
            passed=$(jq -r '.aggregate.passed' "$dir/test-results.json")
            score=$(jq -r '.aggregate.normalized' "$dir/test-results.json")

            # Validate extracted values
            if [ -z "$total" ] || [ "$total" = "null" ]; then
              status="⚠️ ERROR"
              ERROR_COUNT=$((ERROR_COUNT + 1))
              ERROR_MODELS="$ERROR_MODELS $model (missing aggregate data)"
              echo "**$model**: $status (missing aggregate data)" >> summary.md
              continue
            fi

            # Determine pass/fail (all tests must pass)
            if [ "$passed" = "$total" ]; then
              status="✅ PASS"
              PASS_COUNT=$((PASS_COUNT + 1))
            else
              status="❌ FAIL"
              FAIL_COUNT=$((FAIL_COUNT + 1))
              FAILED_MODELS="$FAILED_MODELS $model"
            fi

            echo "**$model**: $status ($passed/$total tests passed, score: $score)" >> summary.md
          done

          echo "" >> summary.md
          echo "---" >> summary.md
          echo "" >> summary.md
          echo "## Summary" >> summary.md
          echo "" >> summary.md
          echo "- **Passed**: $PASS_COUNT models" >> summary.md
          echo "- **Failed**: $FAIL_COUNT models" >> summary.md

          if [ -n "$FAILED_MODELS" ]; then
            echo "- **Failed models**:$FAILED_MODELS" >> summary.md
          fi

          if [ -n "$ERROR_MODELS" ]; then
            echo "- **Errors**:$ERROR_MODELS" >> summary.md
          fi

          echo "" >> summary.md

          # Append AI analysis if available
          if [ -f benchmark-data.json ]; then
            AI_SUMMARY=$(jq -r '.summary // empty' benchmark-data.json)
            if [ -n "$AI_SUMMARY" ]; then
              echo "## AI Analysis (glm-5)" >> summary.md
              echo "" >> summary.md
              echo "$AI_SUMMARY" >> summary.md
              echo "" >> summary.md
            fi
          fi

          # List all test outputs
          for dir in results/test-output-*; do
            if [ -f "$dir/test-output.log" ]; then
              model=$(basename "$dir" | sed 's/test-output-//')
              echo "## Model: $model" >> summary.md
              echo "" >> summary.md
              echo '```' >> summary.md
              tail -100 "$dir/test-output.log" >> summary.md
              echo '```' >> summary.md
              echo "" >> summary.md
            fi
          done

          cat summary.md

          # Set job status based on results
          if [ "$FAIL_COUNT" -gt 0 ] || [ "$ERROR_COUNT" -gt 0 ]; then
            echo ""
            if [ "$FAIL_COUNT" -gt 0 ]; then
              echo "::error::Some models failed benchmarks"
            fi
            if [ "$ERROR_COUNT" -gt 0 ]; then
              echo "::error::Some models had errors during testing"
            fi
            exit 1
          fi

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-summary-${{ steps.sanitize.outputs.short_sha }}
          path: summary.md
