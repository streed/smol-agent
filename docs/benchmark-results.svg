<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="740" height="580" viewBox="0 0 740 580">
  <style>
    .title { font: bold 24px sans-serif; fill: #111827; }
    .subtitle { font: 14px sans-serif; fill: #6b7280; }
    .model-name { font: 500 14px sans-serif; }
    .score { font: bold 13px sans-serif; }
    .status { font: bold 11px sans-serif; }
    .summary { font: 13px sans-serif; }
    .section-label { font: bold 11px sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Header -->
  <text x="40" y="35" class="title">✅ Model Benchmark Results</text>
  <text x="40" y="55" class="subtitle">Run #14 • Mar 3, 2026 • ce1b639 • PASSED</text>
  
  <!-- Legend -->
  <g transform="translate(40, 110)">
    <rect width="12" height="12" rx="2" fill="#22c55e"/>
    <text x="18" y="10" font="12px sans-serif" fill="#374151">Pass</text>
    <rect x="55" width="12" height="12" rx="2" fill="#ef4444"/>
    <text x="73" y="10" font="12px sans-serif" fill="#374151">Fail</text>
  </g>
  
  <!-- Column headers -->
  <g transform="translate(0, 140)">
    <text x="40" y="0" font="bold 12px sans-serif" fill="#6b7280">MODEL</text>
    <text x="240" y="0" font="bold 12px sans-serif" fill="#6b7280">RESULT</text>
    <text x="550" y="0" font="bold 12px sans-serif" fill="#6b7280">SCORE</text>
    <text x="610" y="0" font="bold 12px sans-serif" fill="#6b7280">%</text>
  </g>
  
  <!-- Divider -->
  <line x1="40" y1="155" x2="700" y2="155" stroke="#e5e7eb" stroke-width="1"/>
  
  
    <g transform="translate(0, 160)">
