    <g transform="translate(0, 260)">
      <text x="40" y="20" class="model-name" fill="#1f2937">rnj-1:8b</text>
      <rect x="240" y="5" width="300" height="16" rx="4" fill="#e5e7eb"/>
      <rect x="240" y="5" width="300" height="16" rx="4" fill="#22c55e"/>
      <text x="550" y="20" class="score" fill="#166534">5/5</text>
      <text x="610" y="20" class="score" fill="#166534">100%</text>
      <rect x="620" y="0" width="80" height="24" rx="4" fill="#dcfce7"/>
      <text x="628" y="17" class="status" fill="#166534">PASS</text>
    </g>
    <g transform="translate(0, 310)">
      <text x="40" y="20" class="model-name" fill="#1f2937">ministral-3:3b</text>
      <rect x="240" y="5" width="300" height="16" rx="4" fill="#e5e7eb"/>
      <rect x="240" y="5" width="300" height="16" rx="4" fill="#22c55e"/>
      <text x="550" y="20" class="score" fill="#166534">5/5</text>
      <text x="610" y="20" class="score" fill="#166534">100%</text>
      <rect x="620" y="0" width="80" height="24" rx="4" fill="#dcfce7"/>
      <text x="628" y="17" class="status" fill="#166534">PASS</text>
    </g>
    <g transform="translate(0, 360)">
      <text x="40" y="20" class="model-name" fill="#1f2937">glm-5</text>
      <rect x="240" y="5" width="300" height="16" rx="4" fill="#e5e7eb"/>
      <rect x="240" y="5" width="300" height="16" rx="4" fill="#22c55e"/>
      <text x="550" y="20" class="score" fill="#166534">5/5</text>
      <text x="610" y="20" class="score" fill="#166534">100%</text>
      <rect x="620" y="0" width="80" height="24" rx="4" fill="#dcfce7"/>
      <text x="628" y="17" class="status" fill="#166534">PASS</text>
    </g>
  
  <!-- Divider before summary -->
  <line x1="40" y1="430" x2="700" y2="430" stroke="#e5e7eb" stroke-width="1"/>
  <text x="40" y="424" class="section-label" fill="#6b7280">AI ANALYSIS (glm-5)</text>
  <text x="40" y="450" class="summary" fill="#374151">All tested models passed their benchmark scenarios successfully. The glm-5 model</text>
  <text x="40" y="470" class="summary" fill="#374151">demonstrated excellent reasoning and agentic capabilities, while</text>
  <text x="40" y="490" class="summary" fill="#374151">qwen3-coder-next and devstral-small-2:24b showed strong performance on</text>
  <text x="40" y="510" class="summary" fill="#374151">tool-calling and code editing tasks. Smaller models like rnj-1:8b and</text>
  <text x="40" y="530" class="summary" fill="#374151">ministral-3:3b also performed well within their parameter constraints.</text>
</svg>